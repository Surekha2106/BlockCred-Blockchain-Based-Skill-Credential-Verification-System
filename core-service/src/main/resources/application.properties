# Spring Boot Application Properties
spring.application.name=blockcred-core
server.port=8080

# H2 Database (In-Memory for Demo)
spring.datasource.url=jdbc:h2:mem:blockcreddb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Use MySQL (To switch: comment out H2 section above and uncomment this section)
# spring.datasource.url=jdbc:mysql://localhost:3306/blockcreddb?createDatabaseIfNotExist=true&useSSL=false
# spring.datasource.username=root
# spring.datasource.password=root
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.jpa.hibernate.ddl-auto=update
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
